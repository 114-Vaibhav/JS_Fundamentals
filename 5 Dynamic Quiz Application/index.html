<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Quiz Application</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body>
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">Dynamic Quiz Application</h1>
        <div id="quiz-container">
            <div class="flex items-start gap-3 p-3">
                <div
                    class="flex flex-col items-center justify-center bg-green-500 text-white rounded-full w-10 h-10 sm:w-12 sm:h-12 text-xs sm:text-sm font-bold">
                    <span>Q.</span>

                    <span id="question-number">1</span>
                </div>
                <div id="question" class="flex-1">
                    <p class="text-sm sm:text-base font-medium">
                        What is the capital of France?
                    </p>
                </div>
            </div>
            <div id="options" class="m-4 grid grid-cols-1">
                <div class="flex items-center">
                    <input type="radio" name="answer" id="option1" class="mr-2">
                    <label for="option1" class="bg-blue-500 text-white p-1 m-2 rounded">Paris</label>
                </div>
                <div class="flex items-center">
                    <input type="radio" name="answer" id="option2" class="mr-2">
                    <label for="option2" class="bg-blue-500 text-white p-1 m-2 rounded">London</label>
                </div>
                <div class="flex items-center">
                    <input type="radio" name="answer" id="option3" class="mr-2">
                    <label for="option3" class="bg-blue-500 text-white p-1 m-2 rounded">Berlin</label>
                </div>
                <div class="flex items-center">
                    <input type="radio" name="answer" id="option4" class="mr-2">
                    <label for="option4" class="bg-blue-500 text-white p-1 m-2 rounded">Rome</label>
                </div>
            </div>
            <div id="submit-container" class="m-4">
                <button id="submit" class="bg-green-500 text-white p-2 rounded">Submit</button>
            </div>
            <button id="next-question" class="bg-blue-500 text-white p-2 rounded">Next Question</button>
            <div id="result" class="mt-4 text-lg font-bold">Score: 0</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
