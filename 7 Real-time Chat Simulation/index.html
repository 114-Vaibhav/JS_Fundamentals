<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Chat Simulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="">
    <h2 class="text-2xl font-bold text-center mt-10">Real-time Chat Simulation</h2>
    <div class="flex space-x-8 bg-gray-100 items-center justify-center min-h-screen">

        <div class="bg-white shadow-lg rounded-lg w-full max-w-md p-6">
            <h2 class="text-2xl font-bold mb-4">Vaibhav's Phone</h2>
            <div id="chat-vg" class=" h-64 overflow-y-auto mb-4 p-4 border border-gray-300 rounded-lg bg-gray-50">
                <!-- Chat messages will appear here -->
            </div>
            <div class="flex space-x-2">
                <input id="message-vg" type="text" placeholder="Type your message..."
                    class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button id="send-vg" type="submit"
                    class="bg-blue-500 text-white py-2 px-4 rounded-lg hover:bg-blue-600">Send</button>
            </div>
        </div>

        <div class="bg-white shadow-lg rounded-lg w-full max-w-md p-6">
            <h2 class="text-2xl font-bold mb-4">SK's Phone</h2>
            <div id="chat-sk" class="h-64 overflow-y-auto mb-4 p-4 border border-gray-300 rounded-lg bg-gray-50">
                <!-- Chat messages will appear here -->
            </div>
            <div class="flex space-x-2">
                <input id="message-sk" type="text" placeholder="Type your message..."
                    class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button id="send-sk" type="submit"
                    class="bg-blue-500 text-white py-2 px-4 rounded-lg hover:bg-blue-600">Send</button>
            </div>
        </div>
    </div>



    <script src="script.js"></script>
</body>

</html>
