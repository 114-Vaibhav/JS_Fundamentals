<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag and Drop List Reordering</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">Drag and Drop List Reordering</h1>
        <ul id="draggable-list" class="space-y-2">
            <div class="rounded p-2 bg-gray-100 w-full h-24" ondrop="dropHandler(event)"
                ondragover="dragoverHandler(event)">
                <li id="item1" class="p-4 bg-gray-200 rounded cursor-move w-full h-full flex items-center"
                    ondragstart="dragstartHandler(event)" draggable="true">
                    Item 1
                </li>
            </div>


            <div class="rounded p-2 bg-gray-100 w-full h-24" ondrop="dropHandler(event)"
                ondragover="dragoverHandler(event)">
                <li id="item2" class="p-4 bg-gray-200 rounded cursor-move w-full h-full flex items-center"
                    ondragstart="dragstartHandler(event)" draggable="true">
                    Item 2
                </li>
            </div>
            <div class="rounded p-2 bg-gray-100 w-full h-24" ondrop="dropHandler(event)"
                ondragover="dragoverHandler(event)">
            </div>

            <div class="rounded p-2 bg-gray-100 w-full h-24" ondrop="dropHandler(event)"
                ondragover="dragoverHandler(event)">
                <li id="item3" class="p-4 bg-gray-200 rounded cursor-move w-full h-full flex items-center"
                    ondragstart="dragstartHandler(event)" draggable="true">
                    Item 3
                </li>
            </div>
            <div class="rounded p-2 bg-gray-100 w-full h-24" ondrop="dropHandler(event)"
                ondragover="dragoverHandler(event)">
            </div>

            <div class="rounded p-2 bg-gray-100 w-full h-24" ondrop="dropHandler(event)"
                ondragover="dragoverHandler(event)">
                <li id="item4" class="p-4 bg-gray-200 rounded cursor-move w-full h-full flex items-center"
                    ondragstart="dragstartHandler(event)" draggable="true">
                    Item 4
                </li>
            </div>

            <div class="rounded p-2 bg-gray-100 w-full h-24" ondrop="dropHandler(event)"
                ondragover="dragoverHandler(event)">
                <li id="item5" class="p-4 bg-gray-200 rounded cursor-move w-full h-full flex items-center"
                    ondragstart="dragstartHandler(event)" draggable="true">
                    Item 5
                </li>
            </div>
        </ul>
    </div>

    <script src="script.js"></script>
</body>

</html>
