<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive To-Do List Application</title>
    <!-- <link href="style.css" rel="stylesheet"> -->

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-6 rounded shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold mb-4">To-Do List</h1>
        <div class="flex mb-4">
            <input id="taskInput" type="text" placeholder="Add a new task" class="flex-grow p-2 border rounded-l">
            <button id="addTaskBtn" class="bg-blue-500 text-white px-4 py-2 rounded-r">Add</button>
        </div>
        <ul id="taskList" class="list-disc pl-5"></ul>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js"></script>
</body>

</html>
