<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator
    </title>
</head>

<body>
    <div class="container mx-auto p-4">
        <h1 class="text-xl sm:text-2xl md:text-3xl font-bold mb-4 text-center">
            Simple Calculator
        </h1>

        <div id="calculator" class="w-full max-w-xs sm:max-w-sm md:max-w-md mx-auto bg-gray-100 p-4 rounded shadow-md">

            <input type="text" id="display"
                class="w-full p-2 sm:p-3 mb-4 text-right border rounded text-base sm:text-lg md:text-xl" readonly>

            <div class="grid grid-cols-4 gap-2 sm:gap-3">
                <button class="p-3 sm:p-4 bg-gray-200 rounded text-sm sm:text-base
                hover:bg-neutral-300 " data-value="7">7</button>
                <button class="p-3 sm:p-4 bg-gray-200 rounded text-sm sm:text-base hover:bg-neutral-300 "
                    data-value="8">8</button>
                <button class="p-3 sm:p-4 bg-gray-200 rounded text-sm sm:text-base hover:bg-neutral-300 "
                    data-value="9">9</button>
                <button class="p-3 sm:p-4 bg-orange-400 text-white rounded hover:bg-orange-500"
                    data-value="/">/</button>
                <button class="p-3 sm:p-4 bg-gray-200 rounded text-sm sm:text-base hover:bg-neutral-300 "
                    data-value="4">4</button>
                <button class="p-3 sm:p-4 bg-gray-200 rounded text-sm sm:text-base hover:bg-neutral-300 "
                    data-value="5">5</button>
                <button class="p-3 sm:p-4 bg-gray-200 rounded text-sm sm:text-base hover:bg-neutral-300 "
                    data-value="6">6</button>
                <button class="p-3 sm:p-4 bg-orange-400 text-white rounded hover:bg-orange-500"
                    data-value="*">*</button>
                <button class="p-3 sm:p-4 bg-gray-200 rounded text-sm sm:text-base hover:bg-neutral-300 "
                    data-value="1">1</button>
                <button class="p-3 sm:p-4 bg-gray-200 rounded text-sm sm:text-base hover:bg-neutral-300 "
                    data-value="2">2</button>
                <button class="p-3 sm:p-4 bg-gray-200 rounded text-sm sm:text-base hover:bg-neutral-300 "
                    data-value="3">3</button>
                <button class="p-3 sm:p-4 bg-orange-400 text-white rounded hover:bg-orange-500"
                    data-value="+">+</button>
                <button class="p-3 sm:p-4 bg-gray-200 rounded text-sm sm:text-base hover:bg-neutral-300 "
                    data-value="0">0</button>
                <button class="p-3 sm:p-4 bg-gray-200 rounded text-sm sm:text-base hover:bg-neutral-300 "
                    data-value=".">.</button>
                <button class="p-3 sm:p-4 bg-orange-400 text-white rounded hover:bg-orange-500"
                    data-value="-">-</button>
                <button id="clear" class="p-3 sm:p-4 bg-red-500 hover:bg-red-700 text-white rounded"
                    data-value="C">C</button>


                <!-- Add rest of buttons similarly -->
            </div>
            <div class="flex mt-2 col-span-2 w-full ">
                <button id="equals" class="mr-2 w-full p-3 sm:p-4 bg-blue-500 hover:bg-blue-700 text-white rounded"
                    data-value="=">=</button>
                <button id="back" class="p-3 sm:p-4 bg-red-500 hover:bg-red-700 text-white rounded"
                    data-value="back">Back</button>
            </div>
        </div>
    </div>


    <script src="script.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</body>

</html>
