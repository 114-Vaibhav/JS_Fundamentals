<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery Lightbox</title>
</head>

<body>
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4 text-center">Image Gallery Lightbox</h1>

        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <img src="images/img1.jpg" class="thumb cursor-pointer w-full h-32 object-cover rounded"
                data-value="images/img1.jpg">

            <img src="images/img2.jpg" class="thumb cursor-pointer w-full h-32 object-cover rounded"
                data-value="images/img2.jpg">

            <img src="images/img3.jpg" class="thumb cursor-pointer w-full h-32 object-cover rounded"
                data-value="images/img3.jpg">

            <img src="images/img4.jpg" class="thumb cursor-pointer w-full h-32 object-cover rounded"
                data-value="images/img4.jpg">

            <img src="images/img5.jpg" class="thumb cursor-pointer w-full h-32 object-cover rounded"
                data-value="images/img5.jpg">
        </div>
    </div>


    <script src=" script.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</body>

</html>
