<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Scrolling Content Loader</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="min-h-screen bg-gray-100">
        <div class="bg-blue-600 text-white p-4 text-center">
            <h2>Infinite Scrolling Content Loader</h2>
        </div>
        <div id="content" class="max-w-2xl mx-auto p-4">
            <!-- Content will be loaded here -->


        </div>
        <div id="loading" class="loading text-center p-4">
            Loading...
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
