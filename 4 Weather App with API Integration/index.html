<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App with API Integration</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">Weather App</h1>

        <div class="mb-4">
            <input type="text" id="cityInput" placeholder="Enter city name" class="border p-2 w-full">
            <button id="getWeather" class="bg-blue-500 text-white p-2 mt-2 w-full">Get Weather</button>
        </div>

        <div id="weatherResult" class="mt-4 bg-white p-4 rounded shadow">
            <p id="loading" class="text-gray-500"></p>
            <h2 class="text-xl font-semibold" id="cityName"></h2>
            <p id="temperature"></p>
            <p id="description"></p>
            <p id="humidity"></p>
            <p id="windSpeed"></p>
            <p id="error" class="text-red-500"></p>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>

</html>
