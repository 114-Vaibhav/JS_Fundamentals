<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single-Page Application SPA) with Hash-based Routing
    </title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <header class="bg-gray-800 text-white p-4">
        <nav class="bg-gray-800 text-white p-4">
            <ul class="flex space-x-4">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>

    <main id="main">

        <div id="home" class="p-4">
            <div id="content" class="p-4">
                <h1 class="text-2xl font-bold mb-4">Welcome to My SPA</h1>
                <p>This is a simple single-page application using hash-based routing.</p>
            </div>

        </div>


    </main>
    <footer>
        <p>&copy; 2026 My SPA</p>
    </footer>
    <script src="script.js"></script>
